<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Zylve</title>

        <style>
            .box {
                background-color: aqua;
                height: 200px;
                width: 200px;
            }
        </style>
    </head>

    <body>
        <div id="app">
            {{ greeting }}
            <input v-model="greeting"/>
            <hr />
            <button v-on:click="isVisible = !isVisible">Click to toggle box</button>
            <div v-show="isVisible" class="box"></div>
        </div>


        <script src="https://unpkg.com/vue@3"></script>
        <script>
            const { createApp } = Vue
            let app = Vue.createApp({
                data: function() {
                    return {
                        greeting: 'Hello World!',
                        isVisible: false
                    }
                }
            })
            app.mount('#app');
        </script>
    </body>
</html>
